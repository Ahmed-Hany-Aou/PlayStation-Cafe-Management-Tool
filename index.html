<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PS Cafe Manager v2.1</title>
    <style>
        /* ========== CSS DESIGN SYSTEM ========== */
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');

        :root {
            --ps-blue: #0072ce; --ps-amber: #ff9f1c; --bg-dark: #050505; --bg-card: #1c1c1e;
            --text-main: #f5f5f5; --text-dim: #9ca3af; --danger: #ff4d4d; --success: #2ecc71; --radius-md: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Manrope', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; flex: 1; width: 100%; }
        
        /* Unified Header */
        .app-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 1rem; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
        .app-header .logo-area { display: flex; align-items: center; gap: 0.75rem; }
        .app-header .ps-logo-circle { width: 32px; height: 32px; border: 2px solid var(--ps-blue); border-radius: 50%; }
        .app-header h1 { font-size: 1.25rem; font-weight: 800; margin: 0; }
        .app-header .nav-links { display: flex; gap: 0.5rem; align-items: center; background: #111; padding: 0.4rem; border-radius: 12px; border: 1px solid #333; flex-wrap: wrap;}
        .app-header .nav-links a { color: var(--text-dim); text-decoration: none; font-weight: 700; padding: 0.6rem 1rem; border-radius: 8px; transition: 0.2s; font-size: 0.9rem; }
        .app-header .nav-links a:hover, .app-header .nav-links a.active { background: #222; color: #fff; }
        .app-header .controls { display: flex; align-items: center; gap: 0.5rem; }

        .btn-toggle { background: #222; border: 1px solid #444; color: #fff; padding: 0.6rem 1rem; border-radius: 8px; cursor: pointer; font-weight: 700; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-toggle:hover { background: #333; }

        .station-section { margin-top: 2rem; }
        .slot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
        .slot-btn { background: var(--bg-card); padding: 1.5rem; border-radius: var(--radius-md); text-align: center; cursor: pointer; border: 1px solid #333; transition: transform 0.1s; }
        .slot-btn[data-status="free"] { border-bottom: 4px solid var(--ps-blue); }
        .slot-btn[data-status="occupied"] { border: 1px solid var(--ps-amber); background: rgba(255, 159, 28, 0.05); }
        .timer { display: block; font-size: 1.2rem; font-weight: 800; color: var(--ps-amber); margin-top: 0.5rem; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
        .modal { background: var(--bg-card); width: 100%; max-width: 450px; border-radius: 20px; padding: 2rem; border: 1px solid #444; max-height: 90vh; overflow-y: auto; }

        .input-group { margin-bottom: 1rem; }
        .input-group input { width: 100%; padding: 0.8rem; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; font-family: inherit; }

        .food-item-row { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 0.75rem; border-radius: 8px; margin-bottom: 0.5rem; }
        .btn-qty { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--ps-blue); background: none; color: var(--ps-blue); cursor: pointer; font-weight: 800; font-size: 1.2rem; }

        .grand-total-row { display: flex; justify-content: space-between; margin-top: 0.5rem; font-size: 1.4rem; font-weight: 800; color: var(--success); }
        .hidden { display: none !important; }

        /* Payment Confirm */
        .confirm-summary { background: #000; padding: 1.25rem; border-radius: 12px; margin: 1rem 0; border: 1px dashed var(--ps-blue); }
        .confirm-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.95rem; }
        .btn-confirm-pay { background: var(--success); color: #000; font-weight: 800; padding: 1rem; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 1rem; font-size: 1.1rem; }
        .btn-back-pay { background: var(--danger); color: #fff; font-weight: 800; padding: 1rem; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 0.5rem; }

        /* Footer */
        footer { padding: 2rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); background: #0a0a0a; }
        .qr-container { display: inline-block; background: #fff; padding: 12px; border-radius: 16px; margin-bottom: 1rem; line-height: 0; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .qr-code { width: 120px; height: 120px; max-width: 100px; image-rendering: pixelated; }
        @media (min-width: 768px) { .qr-code { max-width: 120px; } }
        .credit { font-size: 0.85rem; color: #666; margin-bottom: 0.5rem; }
        .whatsapp-link { color: var(--success); text-decoration: none; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }

        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; border: 2px solid var(--bg-card); background-clip: content-box; }
        ::-webkit-scrollbar-thumb:hover { background: var(--ps-blue); }
        * { scrollbar-width: thin; scrollbar-color: #444 transparent; }
        .sync-indicator { position: fixed; bottom: 10px; right: 10px; font-size: 0.7rem; color: #666; display: flex; align-items: center; gap: 5px; z-index: 9999; pointer-events: none; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .sync-dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .sync-dot.offline { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
    </style>
</head>
<body>

    </div>

            </div>

        <main id="dashboard" class="dashboard"></main>
    </div>

    <!-- START MODAL -->
    <div id="start-modal" class="modal-overlay">
        <div class="modal">
            <h2 data-en="Start Session" data-ar="بدء جلسة">Start Session</h2>
            <div id="start-slot-info" style="margin: 1rem 0; color: var(--ps-blue); font-weight: 800;"></div>
            <div class="input-group"><label data-en="Customer" data-ar="الزبون">Customer</label><input type="text" id="cust-name-input"></div>
            <div class="input-group"><label data-en="Time" data-ar="الوقت">Time</label><input type="time" id="start-time-input"></div>
            <div style="display: flex; gap: 0.5rem;"><button id="confirm-start" class="btn-toggle" style="flex:2; background:var(--ps-blue);" data-en="Start Now" data-ar="ابدأ الآن">Start Now</button><button class="btn-toggle close-trigger" style="flex:1;" data-en="Back" data-ar="رجوع">Back</button></div>
        </div>
    </div>

    <!-- MANAGE MODAL -->
    <div id="manage-modal" class="modal-overlay">
        <div class="modal">
            <h2 data-en="Manage Session" data-ar="إدارة الجلسة">Manage Session</h2>
            <div id="manage-slot-info" style="color:var(--ps-amber); font-weight:800; font-size:0.9rem;"></div>
            <div id="active-timer-display" class="timer" style="font-size: 2.5rem; text-align: center; margin: 1rem 0;">00:00:00</div>
            <div class="input-group"><div style="display:flex; gap:0.5rem;"><input type="time" id="edit-start-time-input" style="flex:1;"><button id="update-start-btn" class="btn-toggle" data-en="Update" data-ar="تحديث">Update</button></div></div>
            <button id="toggle-food" class="btn-toggle" style="width: 100%; justify-content: space-between; margin-bottom: 0.5rem;">
                <span data-en="Add Food/Drinks" data-ar="إضافة مشروبات وأكل">Add Food/Drinks</span>
                <span id="food-count-badge" style="background: var(--ps-amber); color: #000; padding: 2px 8px; border-radius: 10px; display: none;">0</span>
            </button>
            <div id="food-list-container" class="food-list-container hidden"></div>
            <div class="confirm-summary" style="margin: 1rem 0; padding: 1rem; border: 1px solid #333;">
                <div class="confirm-row" style="font-size:0.85rem; color:var(--text-dim);"><span data-en="Gaming" data-ar="اللعب">Gaming</span><span id="live-gaming-val">0.00</span></div>
                <div class="confirm-row" style="font-size:0.85rem; color:var(--text-dim);"><span data-en="Food" data-ar="الطلبات">Food</span><span id="live-food-val">0.00</span></div>
            </div>
            <div class="grand-total-row"><span data-en="Grand Total" data-ar="الإجمالي">Grand Total</span><span id="grand-total-display">0.00 EGP</span></div>
            <button id="pre-end-btn" class="btn-toggle" style="width: 100%; background: var(--danger); margin-top: 1.5rem; padding: 1rem; font-size: 1.1rem;" data-en="End Session & Pay" data-ar="إنهاء الجلسة والدفع">End Session & Pay</button>
            <button class="btn-toggle close-trigger" style="width: 100%; margin-top: 0.5rem;" data-en="Cancel" data-ar="إلغاء">Cancel</button>
        </div>
    </div>

    <!-- PAYMENT CONFIRM -->
    <div id="payment-confirm-modal" class="modal-overlay">
        <div class="modal" style="border-color: var(--success);">
            <h2 data-en="Confirm Payment" data-ar="تأكيد الدفع">Confirm Payment</h2>
            <div class="confirm-summary">
                <div class="confirm-row"><span data-en="Duration" data-ar="المدة">Duration</span><span id="conf-duration" style="color:var(--ps-amber); font-weight:800;">--:--:--</span></div>
                <div class="confirm-row"><span data-en="Gaming" data-ar="اللعب">Gaming</span><span id="conf-gaming">0.00</span></div>
                <div class="confirm-row"><span data-en="Food" data-ar="الطلبات">Food</span><span id="conf-food">0.00</span></div>
                <div class="grand-total-row" style="border-top: 1px solid #333; padding-top: 0.5rem;"><span data-en="Grand Total" data-ar="الإجمالي">Grand Total</span><span id="conf-grand">0.00</span></div>
            </div>
            <button id="final-confirm-btn" class="btn-confirm-pay" data-en="Confirm & Save" data-ar="تأكيد وحفظ">Confirm & Save</button>
            <button id="cancel-confirm-btn" class="btn-back-pay" data-en="Back / Edit" data-ar="رجوع / تعديل">Back / Edit</button>
        </div>
    </div>

    <div class="sync-indicator">
        <div id="sync-dot" class="sync-dot"></div>
        <span id="sync-status-text">Network Ready</span>
    </div>

    <script>
        const CONFIG = {
            stations: [
                { id: "ps4-shared", nameEn: "PS4 Partition", nameAr: "PS4 صالة", pricePerHour: 30, slotsCount: 6 },
                { id: "ps4-private", nameEn: "PS4 Private", nameAr: "PS4 غرفة", pricePerHour: 50, slotsCount: 4 },
                { id: "ps5-shared", nameEn: "PS5 Partition", nameAr: "PS5 صالة", pricePerHour: 60, slotsCount: 4 },
                { id: "ps5-private", nameEn: "PS5 Private", nameAr: "PS5 غرفة", pricePerHour: 100, slotsCount: 2 }
            ],
            foodItems: [
                { id: "cola", nameEn: "Cola", nameAr: "كولا", price: 15 },
                { id: "tea", nameEn: "Tea", nameAr: "شاي", price: 10 },
                { id: "water", nameEn: "Water", nameAr: "مياه", price: 5 },
                { id: "sandwich", nameEn: "Sandwich", nameAr: "ساندوتش", price: 25 }
            ],
            settings: { googleSheetUrl: "https://script.google.com/macros/s/AKfycbxwPUEumOv3TdpxRjsMALTBrxzYRVAusB-BAxhrdv7HDUh_4ONs1FbFNfyHVlPJBMg/exec" }
        };
        class PSCafeApp {
            constructor() {
                this.config = CONFIG;
                this.currentLang = localStorage.getItem('ps-lang') || 'en';
                this.activeSessions = JSON.parse(localStorage.getItem('ps-active')) || [];
                this.completedSessions = JSON.parse(localStorage.getItem('ps-completed')) || [];
                this.pendingSync = JSON.parse(localStorage.getItem('ps-pending')) || [];
                this.activeEditingSession = null;
                window.app = this; this.init();
            }
            init() {
                this.setupEventListeners(); this.updateLanguageUI(); this.renderDashboard();
                setInterval(() => this.updateTimers(), 1000); 
                setInterval(() => this.flushQueue(), 30000); // 30 second heartbeat
                window.addEventListener('online', () => this.updateNetworkStatus(true));
                window.addEventListener('offline', () => this.updateNetworkStatus(false));
                setTimeout(() => {this.flushQueue(); document.getElementById('loading-overlay').style.display='none';}, 800);
                this.updateNetworkStatus(navigator.onLine);
            }
            updateNetworkStatus(online) {
                const dot = document.getElementById('sync-dot');
                const txt = document.getElementById('sync-status-text');
                if(online) { dot.className='sync-dot online'; txt.textContent='System Online'; }
                else { dot.className='sync-dot offline'; txt.textContent='Offline Mode'; }
            }
            updateLanguageUI() {
                document.documentElement.dir = this.currentLang === 'ar' ? 'rtl' : 'ltr';
                document.getElementById('lang-toggle').textContent = this.currentLang === 'en' ? 'العربية' : 'English';
                document.querySelectorAll('[data-en]').forEach(el => el.textContent = el.getAttribute(`data-${this.currentLang}`));
                localStorage.setItem('ps-lang', this.currentLang);
            }
            calculateElapsed(start) {
                const diff = Math.max(0, new Date() - new Date(start));
                const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                return { formatted: `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`, mins: diff/60000 };
            }
            calculateFoodTotal(s) { return Object.entries(s.foodCart || {}).reduce((t,[id,q]) => t + (this.config.foodItems.find(f=>f.id===id)?.price||0)*q, 0); }
            formatDateForSheet(date) {
                const d = new Date(date);
                if (isNaN(d.getTime())) return "-";
                const Y = d.getFullYear(), M = String(d.getMonth()+1).padStart(2,'0'), D = String(d.getDate()).padStart(2,'0');
                const h = String(d.getHours()).padStart(2,'0'), m = String(d.getMinutes()).padStart(2,'0');
                return `${Y}/${M}/${D} ${h}:${m}`;
            }
            renderDashboard() {
                const db = document.getElementById('dashboard'); db.innerHTML = '';
                this.config.stations.forEach(st => {
                    const sec = document.createElement('section'); sec.className = 'station-section';
                    sec.innerHTML = `<div class="station-header"><h2>${this.currentLang==='en'?st.nameEn:st.nameAr}</h2></div><div class="slot-grid" id="grid-${st.id}"></div>`;
                    db.appendChild(sec); const grid = document.getElementById(`grid-${st.id}`);
                    for (let i = 1; i <= st.slotsCount; i++) {
                        const s = this.activeSessions.find(as => as.stationId===st.id && as.slotNumber===i);
                        const b = document.createElement('div'); b.className = 'slot-btn'; 
                        b.dataset.status = s?'occupied':'free';
                        b.dataset.station = st.id; b.dataset.slot = i;
                        const cur = this.currentLang==='en'?'EGP':'ج.م';
                        const rateText = `${st.pricePerHour}${cur}/${this.currentLang==='en'?'hr':'س'}`;
                        b.innerHTML = `<span style="font-size:0.75rem; color:var(--text-dim); display:block; margin-bottom:0.25rem;">${this.currentLang==='en'?'Device':'جهاز'} ${i}</span>
                                       <span style="font-size:0.7rem; color:var(--ps-blue); font-weight:700;">${rateText}</span>
                                       ${s?'<span class="timer">00:00:00</span>':''}`;
                        b.onclick = () => s ? this.openManageModal(s.id) : this.openStartModal(st.id,i);
                        grid.appendChild(b);
                    }
                });
            }
            updateTimers() {
                const cur = this.currentLang==='en'?'EGP':'ج.م';
                this.activeSessions.forEach(s => {
                    const el = document.querySelector(`.slot-btn[data-station="${s.stationId}"][data-slot="${s.slotNumber}"] .timer`);
                    if(el) el.textContent = this.calculateElapsed(s.startTime).formatted;
                });
                if(this.activeEditingSession) {
                    const elap = this.calculateElapsed(this.activeEditingSession.startTime);
                    document.getElementById('active-timer-display').textContent = elap.formatted;
                    const st = this.config.stations.find(x=>x.id===this.activeEditingSession.stationId);
                    const g = (st.pricePerHour/60)*elap.mins, f = this.calculateFoodTotal(this.activeEditingSession);
                    document.getElementById('live-gaming-val').textContent = `${g.toFixed(2)} ${cur}`;
                    document.getElementById('live-food-val').textContent = `${f.toFixed(2)} ${cur}`;
                    document.getElementById('grand-total-display').textContent = `${(g+f).toFixed(2)} ${cur}`;
                }
            }
            renderFoodList() {
                const cur = this.currentLang==='en'?'EGP':'ج.م';
                const cont = document.getElementById('food-list-container'); cont.innerHTML = '';
                this.config.foodItems.forEach(it => {
                    const q = this.activeEditingSession.foodCart?.[it.id] || 0;
                    cont.innerHTML += `<div class="food-item-row"><span>${this.currentLang==='en'?it.nameEn:it.nameAr} <small>(${it.price}${cur})</small></span><div class="qty-controls"><button class="btn-qty" onclick="window.app.updateFoodQty('${it.id}',-1)">-</button><span>${q}</span><button class="btn-qty" onclick="window.app.updateFoodQty('${it.id}',1)">+</button></div></div>`;
                });
                const totalQ = Object.values(this.activeEditingSession.foodCart || {}).reduce((a,b)=>a+b, 0);
                document.getElementById('food-count-badge').style.display = totalQ>0?'block':'none'; document.getElementById('food-count-badge').textContent = totalQ;
            }
            updateFoodQty(fid,d) {
                if(!this.activeEditingSession.foodCart) this.activeEditingSession.foodCart={};
                const n = Math.max(0, (this.activeEditingSession.foodCart[fid]||0)+d);
                if(n===0) delete this.activeEditingSession.foodCart[fid]; else this.activeEditingSession.foodCart[fid]=n;
                this.saveState(); this.renderFoodList(); this.updateTimers();
            }
            openStartModal(sid,sl) {
                this.selectedSlot = { sid, sl }; const st = this.config.stations.find(x=>x.id===sid);
                document.getElementById('start-slot-info').textContent = `${this.currentLang==='en'?st.nameEn:st.nameAr} | Device ${sl}`;
                document.getElementById('start-time-input').value = new Date().toTimeString().slice(0,5);
                document.getElementById('start-modal').style.display='flex';
            }
            openManageModal(sid) {
                this.activeEditingSession = this.activeSessions.find(s=>s.id===sid);
                const st = this.config.stations.find(x=>x.id===this.activeEditingSession.stationId);
                document.getElementById('manage-slot-info').textContent = `${this.currentLang==='en'?st.nameEn:st.nameAr} | Device ${this.activeEditingSession.slotNumber}`;
                document.getElementById('edit-start-time-input').value = new Date(this.activeEditingSession.startTime).toTimeString().slice(0,5);
                document.getElementById('manage-modal').style.display='flex'; this.renderFoodList();
            }
            async flushQueue() {
                const url = this.config.settings.googleSheetUrl; if(!navigator.onLine || !url) return;
                for (const session of [...this.pendingSync]) {
                    try {
                        const st = this.config.stations.find(x=>x.id===session.stationId);
                        const items = Object.entries(session.foodCart || {}).map(([id, q]) => ({ 
                            id, 
                            name: this.config.foodItems.find(f=>f.id===id).nameEn, 
                            quantity: q, 
                            price: this.config.foodItems.find(f=>f.id===id).price 
                        }));
                        
                        const elap = this.calculateElapsed(session.startTime);
                        const gamingCalc = session.gamingTotal || (st ? (st.pricePerHour/60)*elap.mins : 0);
                        const foodCalc = this.calculateFoodTotal(session);

                        const payload = {
                            id: session.id,
                            custName: session.custName || "Guest",
                            startTimeSheet: session.startTimeSheet || this.formatDateForSheet(session.startTime),
                            duration: session.duration || elap.formatted,
                            endTimeSheet: session.endTimeSheet || this.formatDateForSheet(new Date()),
                            stationName: session.stationName || (st ? st.nameEn : "PS"),
                            slotNumber: session.slotNumber,
                            gamingTotal: Number(gamingCalc || 0).toFixed(2),
                            foodTotal: Number(foodCalc || 0).toFixed(2),
                            grandTotal: Number((gamingCalc + foodCalc) || 0).toFixed(2),
                            foodItems: items,
                            auditStartTime: this.formatDateForSheet(session.realStartTime || session.startTime || new Date())
                        };

                        console.log('--- SYNCING RECORD v3.8 ---');
                        console.table(payload);
                        
                        await fetch(url, { method:'POST', mode:'no-cors', body:JSON.stringify(payload) });
                        this.pendingSync = this.pendingSync.filter(x => x.id !== session.id);
                        document.getElementById('sync-status-text').textContent = 'Last Sync: ' + new Date().toLocaleTimeString();
                    } catch (e) { 
                        console.warn('Sync delayed', e); 
                        document.getElementById('sync-dot').className='sync-dot offline';
                    }
                }
                localStorage.setItem('ps-pending', JSON.stringify(this.pendingSync));
            }
            saveState() {
                localStorage.setItem('ps-active', JSON.stringify(this.activeSessions));
                localStorage.setItem('ps-completed', JSON.stringify(this.completedSessions));
            }
            setupEventListeners() {
                document.getElementById('lang-toggle').onclick = () => { this.currentLang=this.currentLang==='en'?'ar':'en'; this.updateLanguageUI(); this.renderDashboard(); };
                document.querySelectorAll('.close-trigger').forEach(b => b.onclick = () => document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'));
                document.getElementById('toggle-food').onclick = () => document.getElementById('food-list-container').classList.toggle('hidden');
                document.getElementById('confirm-start').onclick = () => {
                    const custName = document.getElementById('cust-name-input').value || "Guest";
                    const [h,m] = document.getElementById('start-time-input').value.split(':');
                    const d = new Date(); d.setHours(h,m,0,0);
                    if (d.getTime() > Date.now()) d.setDate(d.getDate() - 1);
                    const realStartTime = new Date().toISOString(); 
                    this.activeSessions.push({ id:Date.now(), stationId:this.selectedSlot.sid, slotNumber:this.selectedSlot.sl, startTime:d.toISOString(), realStartTime, foodCart:{}, custName });
                    this.saveState(); this.renderDashboard(); document.getElementById('start-modal').style.display='none';
                };
                document.getElementById('update-start-btn').onclick = () => {
                    const [h,m] = document.getElementById('edit-start-time-input').value.split(':');
                    const d = new Date(this.activeEditingSession.startTime); d.setHours(h,m,0,0);
                    if (d.getTime() > Date.now()) d.setDate(d.getDate() - 1);
                    this.activeEditingSession.startTime = d.toISOString(); this.saveState(); this.renderDashboard();
                };
                document.getElementById('pre-end-btn').onclick = () => {
                    const s = this.activeEditingSession, st = this.config.stations.find(x=>x.id===s.stationId), elap = this.calculateElapsed(s.startTime);
                    const g = (st.pricePerHour/60)*elap.mins, f = this.calculateFoodTotal(s), cur = this.currentLang==='en'?'EGP':'ج.م';
                    document.getElementById('conf-duration').textContent = elap.formatted;
                    document.getElementById('conf-gaming').textContent = `${g.toFixed(2)} ${cur}`;
                    document.getElementById('conf-food').textContent = `${f.toFixed(2)} ${cur}`;
                    document.getElementById('conf-grand').textContent = `${(g+f).toFixed(2)} ${cur}`;
                    document.getElementById('manage-modal').style.display = 'none'; document.getElementById('payment-confirm-modal').style.display = 'flex';
                };
                document.getElementById('cancel-confirm-btn').onclick = () => { document.getElementById('payment-confirm-modal').style.display='none'; document.getElementById('manage-modal').style.display='flex'; };
                document.getElementById('final-confirm-btn').onclick = () => {
                    const s = this.activeEditingSession, st=this.config.stations.find(x=>x.id===s.stationId), elap=this.calculateElapsed(s.startTime);
                    const g = (st.pricePerHour/60)*elap.mins, f = this.calculateFoodTotal(s);
                    const now = new Date();
                    const record = { 
                        ...s, 
                        stationName: this.currentLang==='en'?st.nameEn:st.nameAr, 
                        endTime: now.toISOString(),
                        startTimeSheet: this.formatDateForSheet(s.startTime),
                        endTimeSheet: this.formatDateForSheet(now),
                        duration: elap.formatted, 
                        gamingTotal: Math.round(g*100)/100, 
                        foodTotal: Math.round(f*100)/100, 
                        grandTotal: Math.round((g+f)*100)/100,
                        realStartTime: s.realStartTime || s.startTime || now.toISOString()
                    };
                    this.completedSessions.push(record); this.activeSessions = this.activeSessions.filter(x=>x.id!==s.id); this.pendingSync.push(record);
                    this.saveState(); localStorage.setItem('ps-pending', JSON.stringify(this.pendingSync));
                    this.renderDashboard(); document.getElementById('payment-confirm-modal').style.display='none'; this.activeEditingSession=null; this.flushQueue();
                };
            }
        }
        new PSCafeApp();
    </script>
</body>
